sonar.projectKey=sirosfoundation_go-wallet-backend
sonar.organization=sirosfoundation

# Go coverage report (generated by CI)
sonar.go.coverage.reportPaths=coverage.out

# Exclude test files from duplication detection
sonar.cpd.exclusions=**/*_test.go

# Exclude vendor and generated files
sonar.exclusions=vendor/**,**/*.pb.go,**/*_test.go,internal/as/cookie_dev.go

# Exclude wiring/config code from coverage requirements (integration-tested, not unit-testable)
sonar.coverage.exclusions=internal/as/routes.go,cmd/**,sdk/**,developer_tools/**

# Security hotspot exclusions for verified false positives.
# jwt.ParseWithClaims is always called with jwt.WithValidMethods([]string{"ES256"})
# which restricts to NIST-approved ECDSA P-256 algorithm only.
# See: internal/service/wia.go validatePop()
sonar.issue.ignore.multicriteria=e1

# Rule: go:S5659 "JWT should be signed and verified with strong cipher algorithms"
# Reason: We enforce ES256/ES384/ES512 via jwt.WithValidMethods — all are strong.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S5659
sonar.issue.ignore.multicriteria.e1.resourceKey=internal/service/wia.go
