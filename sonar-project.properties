# SonarCloud project configuration
sonar.organization=sirosfoundation
sonar.projectKey=sirosfoundation_go-wallet-backend

# Source configuration
sonar.sources=.
sonar.exclusions=**/*_test.go,**/testdata/**,**/vendor/**

# Security hotspot exclusions for verified false positives.
# validatePop() uses ParseUnverified to extract the self-signed JWK from the
# header, then immediately verifies with ParseWithClaims + WithValidMethods(["ES256"]).
# This is the standard pattern for self-signed PoP JWTs (RFC 9449 / IETF DPoP).
# See: internal/service/wia.go validatePop()
sonar.issue.ignore.multicriteria=e1

# Rule: go:S5659 "JWT should be signed and verified with strong cipher algorithms"
# Reason: ParseUnverified is followed by ParseWithClaims with ES256 enforcement.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S5659
sonar.issue.ignore.multicriteria.e1.resourceKey=**/wia.go
