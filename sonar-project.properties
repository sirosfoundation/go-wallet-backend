sonar.projectKey=sirosfoundation_go-wallet-backend
sonar.organization=sirosfoundation

# Go coverage report (generated by CI)
sonar.go.coverage.reportPaths=coverage.out

# Exclude test files from duplication detection
sonar.cpd.exclusions=**/*_test.go

# Exclude vendor and generated files
sonar.exclusions=vendor/**,**/*.pb.go,**/*_test.go,internal/as/cookie_dev.go

# Exclude wiring/config code from coverage requirements (integration-tested, not unit-testable)
sonar.coverage.exclusions=internal/as/routes.go,\
cmd/**,\
sdk/**,\
developer_tools/**,\
internal/engine/oid4vp.go,\
internal/server/providers.go
