sonar.projectKey=sirosfoundation_go-wallet-backend
sonar.organization=sirosfoundation

# Go coverage report (generated by CI)
sonar.go.coverage.reportPaths=coverage.out

# Exclude test files from duplication detection
sonar.cpd.exclusions=**/*_test.go

# Exclude vendor and generated files
sonar.exclusions=vendor/**,**/*.pb.go,**/*_test.go,internal/as/cookie_dev.go

# Exclude infrastructure/wiring code from coverage requirements.
# These are integration-tested or require hardware (PKCS#11) and cannot be unit-tested.
sonar.coverage.exclusions=**/*_test.go,\
**/mocks/**,\
**/*.pb.go,\
internal/as/routes.go,\
cmd/**,\
sdk/**,\
developer_tools/**,\
internal/storage/mongodb/**,\
internal/server/server.go,\
internal/server/providers.go,\
internal/backend/backend.go,\
pkg/signing/pkcs11.go,\
pkg/signing/pkcs11_stub.go,\
pkg/signing/key_loader.go,\
pkg/signing/metrics.go,\
pkg/signing/crypto_signer.go,\
pkg/audit/audit.go,\
pkg/middleware/bodysize.go,\
internal/service/wia_challenge_mongo.go,\
internal/service/native_attestation.go,\
internal/service/metrics.go,\
internal/service/services.go,\
internal/api/admin_instance_handlers.go,\
internal/api/admin_user_handlers.go,\
internal/api/handlers.go,\
internal/engine/session.go,\
internal/engine/oid4vp.go,\
internal/engine/oid4vci.go,\
internal/domain/wallet_instance.go,\
internal/websocket/origin.go,\
internal/websocket/manager.go,\
tests/integration/**

# Security hotspot exclusions for verified false positives.
# validatePop() uses ParseUnverified to extract the self-signed JWK from the
# header, then immediately verifies with ParseWithClaims + WithValidMethods(["ES256"]).
# This is the standard pattern for self-signed PoP JWTs (RFC 9449 / IETF DPoP).
# See: internal/service/wia.go validatePop()
sonar.issue.ignore.multicriteria=e1,e2

# Rule: go:S5659 "JWT should be signed and verified with strong cipher algorithms"
# Reason: ParseUnverified is followed by ParseWithClaims with ES256 enforcement.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S5659
sonar.issue.ignore.multicriteria.e1.resourceKey=**/wia.go

# Rule: githubactions:S8234 "Read-all and Write-all permissions should not be used"
# Reason: permissions: read-all is the OpenSSF Scorecard recommendation for
# least-privilege defaults. Job-level overrides grant specific write access.
# Scorecard is authoritative for supply-chain security; this SonarCloud rule
# conflicts with it.
sonar.issue.ignore.multicriteria.e2.ruleKey=githubactions:S8234
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.yml
